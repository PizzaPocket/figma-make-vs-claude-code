<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma Make vs Claude Code</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f9f9f9;
        overflow: hidden;
      }

      header {
        text-align: center;
        padding: 52px 24px 40px;
        flex-shrink: 0;
        position: relative;
        z-index: 1;
      }

      header h1 {
        font-size: clamp(1.8rem, 4vw, 3rem);
        font-weight: 600;
        color: #111;
        letter-spacing: -0.03em;
        line-height: 1.15;
      }

      header p {
        margin-top: 10px;
        font-size: clamp(0.9rem, 1.5vw, 1.1rem);
        color: #777;
        font-weight: 400;
      }

      .arena {
        flex: 1;
        display: flex;
        min-height: 0;
        gap: 0;
      }

      .side {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        position: relative;
        overflow: hidden;
        transition: flex 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
      }

      .side:hover {
        flex: 1.35;
      }

      .side-figma {
        background: linear-gradient(160deg, #ede9ff 0%, #ddd5ff 100%);
        border-top: 1px solid #d4caff;
      }

      .side-claude {
        background: linear-gradient(160deg, #fff4e6 0%, #ffe8c4 100%);
        border-top: 1px solid #ffd9a0;
      }

      .divider {
        width: 1px;
        background: #e0e0e0;
        flex-shrink: 0;
        align-self: stretch;
        margin: 0;
      }

      .side-content {
        text-align: center;
        padding: 32px 40px;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .side:hover .side-content {
        transform: scale(1.04);
      }

      .label {
        font-size: clamp(0.65rem, 1vw, 0.75rem);
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .side-figma .label { color: #7c3aed; }
      .side-claude .label { color: #c2620a; }

      .side-title {
        font-size: clamp(1.3rem, 2.5vw, 2rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.2;
        margin-bottom: 12px;
      }

      .side-figma .side-title { color: #4c1d95; }
      .side-claude .side-title { color: #7c2d12; }

      .side-sub {
        font-size: clamp(0.8rem, 1.2vw, 0.95rem);
        line-height: 1.6;
        max-width: 220px;
        margin: 0 auto 24px;
      }

      .side-figma .side-sub { color: #6d28d9; opacity: 0.75; }
      .side-claude .side-sub { color: #9a3412; opacity: 0.75; }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 22px;
        border-radius: 100px;
        font-size: 0.85rem;
        font-weight: 500;
        border: none;
        transition: opacity 0.2s, transform 0.2s;
        cursor: pointer;
      }

      .side:hover .cta {
        transform: translateY(-1px);
      }

      .side-figma .cta {
        background: #7c3aed;
        color: #fff;
      }

      .side-claude .cta {
        background: #ea580c;
        color: #fff;
      }

      .cta svg {
        width: 14px;
        height: 14px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Figma Make vs Claude Code</h1>
      <p>where is each tool's place in the design team?</p>
    </header>

    <div class="arena">
      <a class="side side-figma" href="http://localhost:5173" target="_blank">
        <div class="side-content">
          <div class="label">According to</div>
          <div class="side-title">Figma Make</div>
          <div class="cta">
            Open
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8h10M9 4l4 4-4 4"/>
            </svg>
          </div>
        </div>
      </a>

      <div class="divider"></div>

      <a class="side side-claude" href="./from claude code.html" target="_blank">
        <div class="side-content">
          <div class="label">According to</div>
          <div class="side-title">Claude Code</div>
          <div class="cta">
            Open
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8h10M9 4l4 4-4 4"/>
            </svg>
          </div>
        </div>
      </a>
    </div>
  </body>
</html>
